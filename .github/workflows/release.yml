name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # linux-x64: standard GitHub-hosted x64 Ubuntu runner.
          - os: linux
            arch: x64
            runner: ubuntu-24.04
          # linux-arm64: GitHub-hosted native arm64 Ubuntu runner (free for public repos).
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
          # darwin-arm64: Apple Silicon runner. Unannotated macos-* labels are arm64.
          - os: darwin
            arch: arm64
            runner: macos-14
          # darwin-x64: native Intel macOS runner. The macos-13 image is being retired
          # (fully unsupported Dec 2025), so we use macos-15-intel, the current and final
          # GitHub-hosted x86_64 macOS image (available through Aug 2027). Building natively
          # on Intel is more reliable than cross-compiling node-pty's native addon from arm64,
          # so we prefer the native runner and avoid any --arch cross-build hacks.
          - os: darwin
            arch: x64
            runner: macos-15-intel
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.17.0

      - name: Install dependencies (compile node-pty native from source)
        run: npm_config_build_from_source=true npm ci

      - name: Build bundle
        run: bash scripts/bundle.sh ${{ matrix.os }} ${{ matrix.arch }}

      - name: Smoke test the bundled tarball (prove self-containment)
        run: |
          set -euo pipefail
          TARBALL="dist/rinnegan-${{ matrix.os }}-${{ matrix.arch }}.tar.gz"
          test -f "$TARBALL" || { echo "tarball not found: $TARBALL"; exit 1; }

          SMOKE_DIR="$(mktemp -d)"
          tar xzf "$TARBALL" -C "$SMOKE_DIR"
          APP_DIR="$SMOKE_DIR/rinnegan-${{ matrix.os }}-${{ matrix.arch }}"
          test -x "$APP_DIR/bin/rinnegan" || { echo "launcher missing/not executable"; exit 1; }
          test -x "$APP_DIR/runtime/bin/node" || { echo "bundled node missing/not executable"; exit 1; }

          cd "$APP_DIR"

          # Start with a fully scrubbed environment: PATH deliberately EXCLUDES any node,
          # so if the launcher does not use the bundled runtime/bin/node the server cannot start.
          # env -i clears everything; we re-add only HOME, a minimal PATH, and TERM.
          env -i HOME="$HOME" PATH=/usr/bin:/bin TERM=xterm-256color \
            ./bin/rinnegan serve --config ./config.json > server.log 2>&1 &
          SERVER_PID=$!

          cleanup() {
            kill "$SERVER_PID" 2>/dev/null || true
            wait "$SERVER_PID" 2>/dev/null || true
          }
          trap cleanup EXIT

          # Confirm the bundled node truly has no fallback: it must NOT be on the scrubbed PATH.
          if env -i PATH=/usr/bin:/bin command -v node >/dev/null 2>&1; then
            echo "unexpected: node found on scrubbed PATH; smoke test cannot prove self-containment"
            exit 1
          fi

          # Poll for the login page.
          LOGIN_CODE=""
          for i in $(seq 1 30); do
            if ! kill -0 "$SERVER_PID" 2>/dev/null; then
              echo "server exited early; log:"
              cat server.log || true
              exit 1
            fi
            LOGIN_CODE="$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8442/login || true)"
            if [ "$LOGIN_CODE" = "200" ]; then
              break
            fi
            sleep 1
          done

          if [ "$LOGIN_CODE" != "200" ]; then
            echo "GET /login expected 200 but got '$LOGIN_CODE'; log:"
            cat server.log || true
            exit 1
          fi
          echo "GET /login -> 200 OK"

          # Unauthenticated GET / must redirect to login (302).
          ROOT_CODE="$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8442/ || true)"
          if [ "$ROOT_CODE" != "302" ]; then
            echo "GET / expected 302 but got '$ROOT_CODE'; log:"
            cat server.log || true
            exit 1
          fi
          echo "GET / -> 302 OK"

          # HTTPS via bundled Caddy: the --https server ALSO binds 8442, so stop the
          # HTTP-only server first to free the port.
          kill "$SERVER_PID" 2>/dev/null || true
          wait "$SERVER_PID" 2>/dev/null || true

          # Start the full HTTPS stack (rinnegan on 8442 + bundled Caddy on 8443)
          # with the same scrubbed environment. Caddy is invoked by absolute path via
          # RINNEGAN_ROOT, so the scrubbed PATH does not affect it.
          env -i HOME="$HOME" PATH=/usr/bin:/bin TERM=xterm-256color \
            ./bin/rinnegan serve --https --config ./config.json > https.log 2>&1 &
          HTTPS_PID=$!

          cleanup() {
            kill "$SERVER_PID" 2>/dev/null || true
            wait "$SERVER_PID" 2>/dev/null || true
            kill "$HTTPS_PID" 2>/dev/null || true
            wait "$HTTPS_PID" 2>/dev/null || true
          }
          trap cleanup EXIT

          # Poll for the login page over TLS (-k accepts the self-signed cert).
          HTTPS_LOGIN_CODE=""
          for i in $(seq 1 30); do
            if ! kill -0 "$HTTPS_PID" 2>/dev/null; then
              echo "https server exited early; log:"
              cat https.log || true
              exit 1
            fi
            HTTPS_LOGIN_CODE="$(curl -k -s -o /dev/null -w '%{http_code}' https://127.0.0.1:8443/login || true)"
            if [ "$HTTPS_LOGIN_CODE" = "200" ]; then
              break
            fi
            sleep 1
          done

          if [ "$HTTPS_LOGIN_CODE" != "200" ]; then
            echo "HTTPS GET /login expected 200 but got '$HTTPS_LOGIN_CODE'; log:"
            cat https.log || true
            exit 1
          fi

          # Unauthenticated GET / over TLS must redirect to login (302).
          HTTPS_ROOT_CODE="$(curl -k -s -o /dev/null -w '%{http_code}' https://127.0.0.1:8443/ || true)"
          if [ "$HTTPS_ROOT_CODE" != "302" ]; then
            echo "HTTPS GET / expected 302 but got '$HTTPS_ROOT_CODE'; log:"
            cat https.log || true
            exit 1
          fi
          echo "HTTPS via bundled Caddy -> 200/302 OK"

          echo "Smoke test passed for rinnegan-${{ matrix.os }}-${{ matrix.arch }}"

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: rinnegan-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/rinnegan-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
          if-no-files-found: error
          retention-days: 7

  release:
    name: release
    needs: build
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all bundle artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: List downloaded artifacts
        run: find dist -type f -name '*.tar.gz' -print

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" dist/**/*.tar.gz \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --notes "Self-contained rinnegan release ${GITHUB_REF_NAME}. Each tarball bundles its own Node 24.17.0 runtime and a platform-native node-pty. Download the asset for your platform (linux-x64, linux-arm64, darwin-x64, darwin-arm64), extract, and run ./bin/rinnegan. Default login is admin / changeme; change it after first run."
