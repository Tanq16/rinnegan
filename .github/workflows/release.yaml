name: release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.17.0

      # e2e boots bin/rinnegan.js over http+ws and spawns a PTY, so it needs ws + a source-built node-pty.
      - name: Install dependencies (compile node-pty native from source)
        run: npm_config_build_from_source=true npm ci

      - name: Run unit tests
        run: npm test

      # A distinct step, never folded into the unit suite: it stands up a live server over http+ws.
      - name: Run end-to-end tests
        run: node test/e2e.mjs

  create-release:
    name: create-release
    needs: test
    # PRs run the test gate only; skipping here cascades to build/publish via needs, so no PR ever publishes.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_created: ${{ steps.create_release.outputs.release_created }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # make version reads the latest tag + this commit message: [major-release]/[minor-release]/else patch.
      - name: Calculate version
        id: version
        run: |
          NEW_VERSION=$(make -s version)
          echo "New version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        id: create_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            --title "${{ steps.version.outputs.version }}" \
            --draft \
            --target "${{ github.sha }}" \
            --notes "Self-contained rinnegan release ${{ steps.version.outputs.version }}. Each tarball bundles its own Node 24.17.0 runtime and a platform-native node-pty. Download the asset for your platform (linux-x64, linux-arm64, darwin-x64, darwin-arm64), extract, and run ./bin/rinnegan. Default login is admin / changeme; change it after first run."
          echo "release_created=true" >> "$GITHUB_OUTPUT"

  build:
    name: build ${{ matrix.os }}-${{ matrix.arch }}
    needs: create-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: x64
            runner: ubuntu-24.04
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
          # Unannotated macos-* labels are arm64.
          - os: darwin
            arch: arm64
            runner: macos-14
          # Native Intel runner avoids cross-compiling node-pty's native addon from arm64.
          - os: darwin
            arch: x64
            runner: macos-15-intel
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.17.0

      - name: Install dependencies (compile node-pty native from source)
        run: npm_config_build_from_source=true npm ci

      - name: Build bundle
        run: make bundle

      - name: Smoke test the bundled tarball (prove self-containment)
        run: make smoke

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.create-release.outputs.version }}" \
            "dist/rinnegan-${{ matrix.os }}-${{ matrix.arch }}.tar.gz" \
            --clobber

  publish:
    name: publish
    needs: [create-release, build]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${{ needs.create-release.outputs.version }}" --draft=false

  cleanup-on-failure:
    name: cleanup-on-failure
    needs: [create-release, build, publish]
    if: always() && (needs.build.result == 'failure' || needs.publish.result == 'failure') && needs.create-release.outputs.release_created == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # A partial release with missing platform tarballs is worse than none, so drop the draft.
      - name: Delete draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete "${{ needs.create-release.outputs.version }}" --yes
