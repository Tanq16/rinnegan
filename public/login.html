<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — Shared Web Terminal</title>
  <link rel="stylesheet" href="/css/inter.css">
  <link rel="stylesheet" href="/css/jetbrains-mono.css">
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="login-page">
  <main class="login-card">
    <h1>Shared Web Terminal</h1>
    <p class="error" id="login-error" hidden>Invalid username or password.</p>
    <form method="post" action="/login">
      <label>Username
        <input name="username" autocomplete="username" autofocus required>
      </label>
      <label>Password
        <input type="password" name="password" autocomplete="current-password" required>
      </label>
      <button type="submit">Sign in</button>
    </form>
  </main>
  <script>
    if (new URLSearchParams(location.search).get('error') === '1')
      document.getElementById('login-error').hidden = false;
  </script>
</body>
</html>
